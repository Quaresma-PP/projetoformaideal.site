  <!-- Delay 7 minutos (420 segundos) -->
  <script>
    const delaySegundos = 420;

    document.addEventListener("DOMContentLoaded", function () {
      function verificarPlayer() {
        if (typeof smartplayer === 'undefined' || !(smartplayer.instances && smartplayer.instances.length)) {
          return setTimeout(verificarPlayer, 1000);
        }
        const player = smartplayer.instances[0];
        player.on('timeupdate', () => {
          const wrapper = document.getElementById('wrapper-botoes');
          if (player.video.currentTime >= delaySegundos && wrapper.style.display === 'none') {
            wrapper.style.display = 'flex';
          }
        });
      }
      verificarPlayer();
    });
  </script>
